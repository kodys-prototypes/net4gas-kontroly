document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

/* světle modrá · Pantone 2995 C · RGB 0/169/224 */\n  --n4g-white: #ffffff;\n\n  /* ---- Secondary (C.2) ---- */\n  --n4g-grey: #8e908f;        /* šedá · Pantone 423 · RGB 142/144/143 */\n  --n4g-red: #c60c30;         /* červená · Pantone 186 · RGB 198/12/48 */\n\n  /* ---- Dark-blue tints (C.3 A) ---- */\n  --n4g-blue-dark-70: #4d65b5;\n  --n4g-blue-dark-50: #8091ca;\n  --n4g-blue-dark-15: #d9deef;\n\n  /* ---- Medium-blue tints (C.3 B) ---- */\n  --n4g-blue-medium-70: #4d8ccf;\n  --n4g-blue-medium-50: #80addd;\n  --n4g-blue-medium-15: #d9e6f5;\n\n  /* ---- Light-blue tints (C.3 C) ---- */\n  --n4g-blue-light-70: #4dc3e9;\n  --n4g-blue-light-50: #80d4f0;\n  --n4g-blue-light-15: #d9f2fa;\n\n  /* ---- Red tints (C.3 D) ---- */\n  --n4g-red-70: #d7556e;\n  --n4g-red-50: #e38698;\n  --n4g-red-15: #fad9e0;\n\n  /* ---- Grey tints (C.3 E) ---- */\n  --n4g-grey-70: #b0b1b1;\n  --n4g-grey-50: #c7c8c7;\n  --n4g-grey-30: #dbdcdb;\n\n  /* ---- Neutral ramp (web-app extension, harmonised to Pantone 423) ----\n   * The manual defines a single corporate grey; a full UI needs a ramp for\n   * surfaces, borders and text. Built cool-neutral around #8e908f. FLAGGED. */\n  --n4g-ink: #14181f;         /* primary body text (manual: \"černá\") */\n  --n4g-neutral-900: #1f2733;\n  --n4g-neutral-800: #2e3947;\n  --n4g-neutral-700: #475160;\n  --n4g-neutral-600: #6b7280;\n  --n4g-neutral-500: #8e908f;\n  --n4g-neutral-400: #b4b7ba;\n  --n4g-neutral-300: #d2d6da;\n  --n4g-neutral-200: #e5e8ec;\n  --n4g-neutral-100: #f1f3f6;\n  --n4g-neutral-50: #f8fafb;\n\n  /* ---- Functional status (web-app extension) ----\n   * Manual has no green/amber. Danger = brand red; info = brand light blue.\n   * Success/warning added for operational UI (dashboards, alerts). FLAGGED. */\n  --n4g-success: #1f8a5b;\n  --n4g-success-bg: #e4f3eb;\n  --n4g-warning: #b06a00;\n  --n4g-warning-bg: #fbeed6;\n  --n4g-danger: #c60c30;      /* = --n4g-red */\n  --n4g-danger-bg: #fad9e0;   /* = --n4g-red-15 */\n  --n4g-info: #005bbb;\n  --n4g-info-bg: #d9e6f5;\n\n  /* ---------------------------------------------------------------\n   * SEMANTIC ALIASES — reference these in product code, not raw values\n   * --------------------------------------------------------------- */\n  --color-bg: var(--n4g-neutral-50);\n  --color-surface: var(--n4g-white);\n  --color-surface-raised: var(--n4g-white);\n  --color-surface-sunken: var(--n4g-neutral-100);\n  --color-surface-inverse: var(--n4g-blue-dark);\n\n  --color-text: var(--n4g-ink);\n  --color-text-muted: var(--n4g-neutral-600);\n  --color-text-subtle: var(--n4g-neutral-500);\n  --color-text-on-brand: var(--n4g-white);\n  --color-heading: var(--n4g-blue-dark);  /* manual: headings in dark blue */\n\n  --color-border: var(--n4g-neutral-200);\n  --color-border-strong: var(--n4g-neutral-300);\n  --color-divider: var(--n4g-neutral-200);\n\n  --color-primary: var(--n4g-blue-dark);\n  --color-primary-hover: #001d7a;          /* darker Reflex Blue */\n  --color-primary-active: #001660;\n  --color-primary-soft: var(--n4g-blue-dark-15);\n\n  --color-accent: var(--n4g-blue-light);\n  --color-accent-hover: #0094c4;\n  --color-accent-soft: var(--n4g-blue-light-15);\n\n  --color-link: var(--n4g-blue-medium);\n  --color-link-hover: var(--n4g-blue-dark);\n\n  --color-focus-ring: var(--n4g-blue-light);\n\n  /* Brand gradient line motif (\"Linka\", manual E): dark blue → light blue */\n  --n4g-linka: linear-gradient(90deg, var(--n4g-blue-dark) 0%, var(--n4g-blue-dark) 50%, var(--n4g-blue-light) 50%, var(--n4g-blue-light) 100%);\n  --n4g-linka-smooth: linear-gradient(90deg, var(--n4g-blue-dark) 0%, var(--n4g-blue-light) 100%);\n}\n<\u002Fstyle>\n  <style>/* NET4GAS — Typography tokens\n * Corporate typeface: Myriad Pro CE (manual D.1) → shipped as Source Sans 3.\n * Fallback / correspondence face: Arial CE (manual D.2).\n * Body set in Regular; Bold for headings/titles; Semibold for emphasis & the\n * corporate slogan \"Connecting Markets\".\n */\n:root {\n  /* ---- Families ---- */\n  --font-sans: \"Source Sans 3\", \"Myriad Pro\", Arial, \"Helvetica Neue\", Helvetica, sans-serif;\n  --font-body: var(--font-sans);\n  --font-heading: var(--font-sans);\n  --font-mono: \"Source Sans 3\", ui-monospace, \"SFMono-Regular\", \"Cascadia Mono\", Consolas, monospace;\n\n  /* ---- Weights (manual permits Regular / Semibold / Bold) ---- */\n  --fw-regular: 400;   /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold: 700;      /* @kind font */\n\n  /* ---- Type scale (1.250 major-third, 16px base) ---- */\n  --fs-2xs: 0.6875rem;  /* 11px — table micro-labels */\n  --fs-xs: 0.75rem;     /* 12px — captions, meta */\n  --fs-sm: 0.875rem;    /* 14px — secondary UI text */\n  --fs-base: 1rem;      /* 16px — body */\n  --fs-md: 1.125rem;    /* 18px — lead / large body */\n  --fs-lg: 1.375rem;    /* 22px — h4 / card title */\n  --fs-xl: 1.75rem;     /* 28px — h3 */\n  --fs-2xl: 2.25rem;    /* 36px — h2 */\n  --fs-3xl: 2.875rem;   /* 46px — h1 */\n  --fs-4xl: 3.75rem;    /* 60px — display */\n\n  /* ---- Line heights ---- */\n  --lh-tight: 1.15;    /* @kind other */\n  --lh-snug: 1.3;      /* @kind other */\n  --lh-normal: 1.5;    /* @kind other */\n  --lh-relaxed: 1.65;  /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight: -0.01em; /* @kind other */\n  --ls-normal: 0;      /* @kind other */\n  --ls-wide: 0.04em;   /* @kind other */\n  --ls-wider: 0.12em;  /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* NET4GAS — Spacing, radii, borders, shadows, layout\n * The corporate visual language is squared and structural (square logo mark,\n * the horizontal \"Linka\" bar). Radii are small; shadows restrained and cool.\n */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0: 0;\n  --space-1: 0.25rem;   /* 4 */\n  --space-2: 0.5rem;    /* 8 */\n  --space-3: 0.75rem;   /* 12 */\n  --space-4: 1rem;      /* 16 */\n  --space-5: 1.25rem;   /* 20 */\n  --space-6: 1.5rem;    /* 24 */\n  --space-8: 2rem;  */\n  --n4g-blue-light: #00a9e0;  /* světle modrá · Pantone 2995 C · RGB 0/169/224 */\n  --n4g-white: #ffffff;\n\n  /* ---- Secondary (C.2) ---- */\n  --n4g-grey: #8e908f;        /* šedá · Pantone 423 · RGB 142/144/143 */\n  --n4g-red: #c60c30;         /* červená · Pantone 186 · RGB 198/12/48 */\n\n  /* ---- Dark-blue tints (C.3 A) ---- */\n  --n4g-blue-dark-70: #4d65b5;\n  --n4g-blue-dark-50: #8091ca;\n  --n4g-blue-dark-15: #d9deef;\n\n  /* ---- Medium-blue tints (C.3 B) ---- */\n  --n4g-blue-medium-70: #4d8ccf;\n  --n4g-blue-medium-50: #80addd;\n  --n4g-blue-medium-15: #d9e6f5;\n\n  /* ---- Light-blue tints (C.3 C) ---- */\n  --n4g-blue-light-70: #4dc3e9;\n  --n4g-blue-light-50: #80d4f0;\n  --n4g-blue-light-15: #d9f2fa;\n\n  /* ---- Red tints (C.3 D) ---- */\n  --n4g-red-70: #d7556e;\n  --n4g-red-50: #e38698;\n  --n4g-red-15: #fad9e0;\n\n  /* ---- Grey tints (C.3 E) ---- */\n  --n4g-grey-70: #b0b1b1;\n  --n4g-grey-50: #c7c8c7;\n  --n4g-grey-30: #dbdcdb;\n\n  /* ---- Neutral ramp (web-app extension, harmonised to Pantone 423) ----\n   * The manual defines a single corporate grey; a full UI needs a ramp for\n   * surfaces, borders and text. Built cool-neutral around #8e908f. FLAGGED. */\n  --n4g-ink: #14181f;         /* primary body text (manual: \"černá\") */\n  --n4g-neutral-900: #1f2733;\n  --n4g-neutral-800: #2e3947;\n  --n4g-neutral-700: #475160;\n  --n4g-neutral-600: #6b7280;\n  --n4g-neutral-500: #8e908f;\n  --n4g-neutral-400: #b4b7ba;\n  --n4g-neutral-300: #d2d6da;\n  --n4g-neutral-200: #e5e8ec;\n  --n4g-neutral-100: #f1f3f6;\n  --n4g-neutral-50: #f8fafb;\n\n  /* ---- Functional status (web-app extension) ----\n   * Manual has no green/amber. Danger = brand red; info = brand light blue.\n   * Success/warning added for operational UI (dashboards, alerts). FLAGGED. */\n  --n4g-success: #1f8a5b;\n  --n4g-success-bg: #e4f3eb;\n  --n4g-warning: #b06a00;\n  --n4g-warning-bg: #fbeed6;\n  --n4g-danger: #c60c30;      /* = --n4g-red */\n  --n4g-danger-bg: #fad9e0;   /* = --n4g-red-15 */\n  --n4g-info: #005bbb;\n  --n4g-info-bg: #d9e6f5;\n\n  /* ---------------------------------------------------------------\n   * SEMANTIC ALIASES — reference these in product code, not raw values\n   * --------------------------------------------------------------- */\n  --color-bg: var(--n4g-neutral-50);\n  --color-surface: var(--n4g-white);\n  --color-surface-raised: var(--n4g-white);\n  --color-surface-sunken: var(--n4g-neutral-100);\n  --color-surface-inverse: var(--n4g-blue-dark);\n\n  --color-text: var(--n4g-ink);\n  --color-text-muted: var(--n4g-neutral-600);\n  --color-text-subtle: var(--n4g-neutral-500);\n  --color-text-on-brand: var(--n4g-white);\n  --color-heading: var(--n4g-blue-dark);  /* manual: headings in dark blue */\n\n  --color-border: var(--n4g-neutral-200);\n  --color-border-strong: var(--n4g-neutral-300);\n  --color-divider: var(--n4g-neutral-200);\n\n  --color-primary: var(--n4g-blue-dark);\n  --color-primary-hover: #001d7a;          /* darker Reflex Blue */\n  --color-primary-active: #001660;\n  --color-primary-soft: var(--n4g-blue-dark-15);\n\n  --color-accent: var(--n4g-blue-light);\n  --color-accent-hover: #0094c4;\n  --color-accent-soft: var(--n4g-blue-light-15);\n\n  --color-link: var(--n4g-blue-medium);\n  --color-link-hover: var(--n4g-blue-dark);\n\n  --color-focus-ring: var(--n4g-blue-light);\n\n  /* Brand gradient line motif (\"Linka\", manual E): dark blue → light blue */\n  --n4g-linka: linear-gradient(90deg, var(--n4g-blue-dark) 0%, var(--n4g-blue-dark) 50%, var(--n4g-blue-light) 50%, var(--n4g-blue-light) 100%);\n  --n4g-linka-smooth: linear-gradient(90deg, var(--n4g-blue-dark) 0%, var(--n4g-blue-light) 100%);\n}\n\n/* NET4GAS — Typography tokens\n * Corporate typeface: Myriad Pro CE (manual D.1) → shipped as Source Sans 3.\n * Fallback / correspondence face: Arial CE (manual D.2).\n * Body set in Regular; Bold for headings/titles; Semibold for emphasis & the\n * corporate slogan \"Connecting Markets\".\n */\n:root {\n  /* ---- Families ---- */\n  --font-sans: \"Source Sans 3\", \"Myriad Pro\", Arial, \"Helvetica Neue\", Helvetica, sans-serif;\n  --font-body: var(--font-sans);\n  --font-heading: var(--font-sans);\n  --font-mono: \"Source Sans 3\", ui-monospace, \"SFMono-Regular\", \"Cascadia Mono\", Consolas, monospace;\n\n  /* ---- Weights (manual permits Regular / Semibold / Bold) ---- */\n  --fw-regular: 400;   /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold: 700;      /* @kind font */\n\n  /* ---- Type scale (1.250 major-third, 16px base) ---- */\n  --fs-2xs: 0.6875rem;  /* 11px — table micro-labels */\n  --fs-xs: 0.75rem;     /* 12px — captions, meta */\n  --fs-sm: 0.875rem;    /* 14px — secondary UI text */\n  --fs-base: 1rem;      /* 16px — body */\n  --fs-md: 1.125rem;    /* 18px — lead / large body */\n  --fs-lg: 1.375rem;    /* 22px — h4 / card title */\n  --fs-xl: 1.75rem;     /* 28px — h3 */\n  --fs-2xl: 2.25rem;    /* 36px — h2 */\n  --fs-3xl: 2.875rem;   /* 46px — h1 */\n  --fs-4xl: 3.75rem;    /* 60px — display */\n\n  /* ---- Line heights ---- */\n  --lh-tight: 1.15;    /* @kind other */\n  --lh-snug: 1.3;      /* @kind other */\n  --lh-normal: 1.5;    /* @kind other */\n  --lh-relaxed: 1.65;  /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight: -0.01em; /* @kind other */\n  --ls-normal: 0;      /* @kind other */\n  --ls-wide: 0.04em;   /* @kind other */\n  --ls-wider: 0.12em;  /* @kind other */\n}\n\n/* NET4GAS — Spacing, radii, borders, shadows, layout\n * The corporate visual language is squared and structural (square logo mark,\n * the horizontal \"Linka\" bar). Radii are small; shadows restrained and cool.\n */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0: 0;\n  --space-1: 0.25rem;   /* 4 */\n  --space-2: 0.5rem;    /* 8 */\n  --space-3: 0.75rem;   /* 12 */\n  --space-4: 1rem;      /* 16 */\n  --space-5: 1.25rem;   /* 20 */\n  --space-6: 1.5rem;    /* 24 */\n  --space-8: 2rem;      /* 32 */\n  --space-10: 2.5rem;   /* 40 */\n  --space-12: 3rem;     /* 48 */\n  --space-16: 4rem;     /* 64 */\n  --space-20: 5rem;     /* 80 */\n  --space-24: 6rem;     /* 96 */\n\n  /* ---- Radii (squared corporate feel) ---- */\n  --radius-none: 0;\n  --radius-xs: 2px;\n  --radius-sm: 3px;     /* matches the logo mark's corner softening */\n  --radius-md: 5px;\n  --radius-lg: 8px;\n  --radius-xl: 12px;\n  --radius-pill: 999px;\n\n  /* ---- Borders ---- */\n  --border-width: 1px;\n  --border-width-strong: 2px;\n  --border-thin: 1px solid var(--color-border);\n  --border-strong: 1px solid var(--color-border-strong);\n  /* Table rules from manual K.1 */\n  --rule-header: 2px solid var(--n4g-blue-dark);   /* nadpisová linka 1,5b */\n  --rule-sub: 1px solid var(--n4g-blue-dark);      /* podnadpis 0,5b */\n  --rule-base: 1px solid var(--n4g-neutral-300);   /* základní linka 0,5b */\n\n  /* ---- Elevation (cool, low-spread) ---- */\n  --shadow-xs: 0 1px 2px rgba(20, 24, 31, 0.06);\n  --shadow-sm: 0 1px 3px rgba(20, 24, 31, 0.08), 0 1px 2px rgba(20, 24, 31, 0.04);\n  --shadow-md: 0 4px 12px rgba(20, 24, 31, 0.08), 0 2px 4px rgba(20, 24, 31, 0.04);\n  --shadow-lg: 0 12px 28px rgba(20, 24, 31, 0.12), 0 4px 8px rgba(20, 24, 31, 0.05);\n  --shadow-focus: 0 0 0 3px rgba(0, 169, 224, 0.45);   /* light-blue focus ring */\n\n  /* ---- The \"Linka\" bar (manual E) ---- */\n  --linka-height: 4px;\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0, 0, 0.2, 1);        /* @kind other */\n  --dur-fast: 120ms;   /* @kind other */\n  --dur-base: 200ms;   /* @kind other */\n  --dur-slow: 320ms;   /* @kind other */\n\n  /* ---- Layout ---- */\n  --container-sm: 640px;   /* @kind other */\n  --container-md: 880px;   /* @kind other */\n  --container-lg: 1120px;  /* @kind other */\n  --container-xl: 1320px;  /* @kind other */\n  --z-base: 1;        /* @kind other */\n  --z-sticky: 100;    /* @kind other */\n  --z-overlay: 1000;  /* @kind other */\n  --z-modal: 1100;    /* @kind other */\n  --z-toast: 1200;    /* @kind other */\n}\n\n/* NET4GAS — Base element styles & a few brand utilities.\n * Foundations only; component look lives in the React components.\n */\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--fs-base);\n  line-height: var(--lh-normal);\n  color: var(--color-text);\n  background: var(--color-bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  margin: 0 0 0.5em;\n  font-family: var(--font-heading);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  color: var(--color-heading);\n  letter-spacing: var(--ls-tight);\n}\nh1 { font-size: var(--fs-3xl); }\nh2 { font-size: var(--fs-2xl); }\nh3 { font-size: var(--fs-xl); }\nh4 { font-size: var(--fs-lg); }\nh5 { font-size: var(--fs-md); }\nh6 { font-size: var(--fs-sm); text-transform: uppercase; letter-spacing: var(--ls-wide); color: var(--color-text-muted); }\n\np { margin: 0 0 1em; }\na { color: var(--color-link); text-decoration: none; }\na:hover { color: var(--color-link-hover); text-decoration: underline; }\n\nstrong, b { font-weight: var(--fw-bold); }\nsmall { font-size: var(--fs-sm); }\n\n:focus-visible {\n  outline: none;\n  box-shadow: var(--shadow-focus);\n  border-radius: var(--radius-xs);\n}\n\nhr { border: 0; border-top: var(--border-thin); margin: var(--space-6) 0; }\n\ncode, kbd, samp { font-family: var(--font-mono); font-size: 0.9em; }\n\n/* The corporate \"Linka\" bar (manual E): dark-blue + light-blue band.\n   Place at the bottom edge of a surface; height ≤ height of the logo's \"N\". */\n.n4g-linka {\n  height: var(--linka-height);\n  width: 100%;\n  background: var(--n4g-linka);\n}\n.n4g-linka--smooth { background: var(--n4g-linka-smooth); }\n\n/* Eyebrow / wayfinding label */\n.n4g-eyebrow {\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-semibold);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-wide);\n  color: var(--color-accent);\n}\n\n<\u002Fstyle>\n  <script src=\"45f3be45-2e52-4fb5-bf94-7352da44c1a3\"><\u002Fscript>\n  <style>\n    html,body{height:100%;margin:0;background:var(--color-bg);}\n    *{box-sizing:border-box;}\n    :root{ --shadow-focus: none; }\n    ::-webkit-scrollbar{width:11px;height:11px;}\n    ::-webkit-scrollbar-thumb{background:var(--n4g-neutral-300);border-radius:6px;border:3px solid var(--color-bg);}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div data-screen-label=\"Net4Gas HSSE — Editor a Detail kontroly\" style=\"height:100vh;font-family:var(--font-body);color:var(--color-text);\">{{ app }}<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:860},&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sablony&quot;,&quot;kontroly&quot;],&quot;default&quot;:&quot;kontroly&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    if (typeof React !== 'undefined') { window.React = window.React || React; }\n    this.TYPES = {\n      text:   { label: 'Volný text',        icon: 'pilcrow',     desc: 'Otevřená textová odpověď' },\n      single: { label: 'Jedna možnost',     icon: 'circle-dot',  desc: 'Výběr jedné z možností' },\n      multi:  { label: 'Více možností',      icon: 'list-checks', desc: 'Zaškrtnutí více možností' },\n      select: { label: 'Výběr ze seznamu',  icon: 'list',        desc: 'Rozbalovací nabídka' },\n      photo:  { label: 'Foto',              icon: 'camera',      desc: 'Fotodokumentace' },\n    };\n    this.SEVERITY = ['Nízká', 'Střední', 'Vysoká'];\n    this.LOGO = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIwAAACMCAYAAACuwEE+AAAACXBIWXMAAAsSAAALEgHS3X78AAAgAElEQVR4nO1dB1RU19ZO3nrvf+lREWwIlqixG3uMmsSYaF7UWG
